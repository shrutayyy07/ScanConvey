spring.application.name=conveyor-java-service

# Week 1: WebFlux server port
server.port=8080

# Week 3: gRPC server port (Python connects here)
grpc.server.port=9090
grpc.server.security.enabled=false

# Week 7: Audit log directory (relative to working dir)
audit.log-dir=audit

# Virtual threads (Java 21 - Week 1)
spring.threads.virtual.enabled=true

# Logging
logging.level.com.conveyor=DEBUG
logging.level.io.grpc=WARN
